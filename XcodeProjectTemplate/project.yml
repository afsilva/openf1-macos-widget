name: OpenF1Dashboard
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  OpenF1DashboardiOSApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Config/OpenF1DashboardiOSApp-Info.plist
    entitlements:
      path: Config/OpenF1DashboardiOSApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.afsilva.openf1widget
    sources:
      - path: OpenF1DashboardiOSApp
      - path: OpenF1Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afsilva.OpenF1DashboardiOSApp
        PRODUCT_NAME: OpenF1DashboardiOS
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/OpenF1DashboardiOSApp-Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
    dependencies:
      - target: OpenF1DashboardiOSWidget
        embed: true
        codeSign: true
    scheme:
      testTargets: []

  OpenF1DashboardiOSWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Config/OpenF1DashboardiOSWidget-Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(OPENF1_HOST_APP_BUNDLE_IDENTIFIER)"
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Config/OpenF1DashboardiOSWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.afsilva.openf1widget
    sources:
      - path: OpenF1DashboardiOSWidget
      - path: OpenF1Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.afsilva.OpenF1DashboardiOSApp.widget
        PRODUCT_NAME: OpenF1DashboardiOSWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/OpenF1DashboardiOSWidget-Info.plist
        OPENF1_HOST_APP_BUNDLE_IDENTIFIER: com.afsilva.OpenF1DashboardiOSApp
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
